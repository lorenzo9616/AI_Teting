<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Shift Component Design -->
  <rect x="20" y="20" width="360" height="160" rx="8" fill="white" stroke="#E1E4E8" stroke-width="1"/>
  
  <!-- Left Accent Bar -->
  <path d="M20 28C20 23.5817 23.5817 20 28 20H30V180H28C23.5817 180 20 176.418 20 172V28Z" fill="#FF4D4D"/>
  
  <!-- Shift Info -->
  <text x="50" y="55" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Shift Details</text>
  
  <text x="50" y="90" font-family="Arial" font-size="14" fill="#666">Employee:</text>
  <text x="130" y="90" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Chef Gordon</text>
  
  <text x="50" y="115" font-family="Arial" font-size="14" fill="#666">Time:</text>
  <text x="130" y="115" font-family="Arial" font-size="14" fill="#333">09:00 AM - 05:00 PM</text>
  
  <text x="50" y="140" font-family="Arial" font-size="14" fill="#666">Area:</text>
  <rect x="130" y="127" width="80" height="20" rx="10" fill="#FFF5F5"/>
  <text x="170" y="141" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FF4D4D">Kitchen</text>
  
  <!-- Action Buttons -->
  <circle cx="340" cy="50" r="15" fill="#F1F3F5"/>
  <text x="340" y="54" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">✎</text>
  
  <circle cx="340" cy="90" r="15" fill="#FFF5F5"/>
  <text x="340" y="94" text-anchor="middle" font-family="Arial" font-size="12" fill="#FF4D4D">×</text>
</svg>
