<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Backdrop -->
  <rect width="600" height="600" fill="black" fill-opacity="0.5"/>
  
  <!-- Modal -->
  <rect x="100" y="80" width="400" height="440" rx="8" fill="white"/>
  <text x="130" y="125" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Edit Shift</text>
  
  <text x="130" y="170" font-family="Arial" font-size="14" fill="#666">Employee</text>
  <rect x="130" y="180" width="340" height="35" rx="4" stroke="#DDD"/>
  <text x="145" y="202" font-family="Arial" font-size="14" fill="#333">Chef Gordon</text>
  
  <text x="130" y="245" font-family="Arial" font-size="14" fill="#666">Time Range</text>
  <rect x="130" y="255" width="160" height="35" rx="4" stroke="#DDD"/>
  <text x="145" y="277" font-family="Arial" font-size="14" fill="#333">09:00 AM</text>
  <rect x="310" y="255" width="160" height="35" rx="4" stroke="#DDD"/>
  <text x="325" y="277" font-family="Arial" font-size="14" fill="#333">05:00 PM</text>
  
  <text x="130" y="320" font-family="Arial" font-size="14" fill="#666">Area of Designation</text>
  <rect x="130" y="330" width="340" height="35" rx="4" stroke="#DDD"/>
  <text x="145" y="352" font-family="Arial" font-size="14" fill="#333">Kitchen</text>
  
  <!-- Footer -->
  <rect x="130" y="440" width="160" height="40" rx="4" stroke="#FF4D4D" stroke-width="1"/>
  <text x="210" y="465" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#FF4D4D">Cancel</text>
  <rect x="310" y="440" width="160" height="40" rx="4" fill="#FF4D4D"/>
  <text x="390" y="465" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Save Shift</text>
</svg>
